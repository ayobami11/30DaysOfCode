<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
        <link href="https://fonts.googleapis.com/css2?family=Spartan:wght@500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./style.css" type="text/css">
        <title>Job Listings Challenge</title>
        <!-- Made use of the Handlebars.js library so as to create templates for each company from the provided object -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.0.11/handlebars.js"></script>
        <script id="template" type="text/x-handlebars-template">
            <!-- Companies container -->
            {{#each companies}}
            <section class="company flex">
                <!-- Company logo -->
                <figure>
                    <img src="{{this.logo}}" alt="{{this.company}}">
                </figure>
                <!-- Main section -->
                <div class="main-section flex">
                    <div class="top-div">
                        <!-- Company info section -->
                        <div class="company-info flex">
                            <p class="brand">{{this.company}}</p>
                            {{#if this.new}}
                                <p class="new">New!</p>
                            {{/if}}
                            {{#if this.featured}}
                                <p class="featured">Featured</p>
                            {{/if}}
                        </div>
                        <p class="position"><a href="#">{{this.position}}</a></p>
                        <!-- Job info section -->
                        <div class="job-info flex">
                            <p class="posted-at">{{this.postedAt}}</p>
                            <p>&#8226 {{this.contract}}</p>
                            <p>&#8226 {{this.location}}</p>
                        </div>
                    </div>
                    <!-- Requirements section -->
                    <div class="requirements flex">
                        <a href="#">{{this.role}}</a>
                        <a href="#">{{this.level}}</a>
                        {{#each languages}}
                            <a href="#">{{this}}</a>
                        {{/each}}
                        {{#each tools}}
                            <a href="#">{{this}}</a>
                        {{/each}}
                    </div>
                </div>
            </section>
            {{/each}}
        </script>
    </head>
    <body>
        <header>
            <!-- Top background -->
            <div id="bg-top">

            </div>
        </header>
        <main>
            <!-- Jobs container -->
            <section id="jobs">

            </section>
        </main>
        <footer>
            <!-- Attribution section -->
            <div class="attribution">
                <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.</p>
                <p>Coded by <a href="https://www.github.com/ayobami11">Tunwase Ayobami</a>.</p>
            </div>
        </footer>
        <script src="./script.js"></script>
    </body>
</html>
