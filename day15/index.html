<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Day Counter</title>
        <link rel="stylesheet" href="./style.css" type="text/css">
    </head>
    <body>
        <form>
            <div>
                <!-- 'Month' form input -->
                <label for="month">Month:</label>
                <input id="month" type="number" required>
                <br>
                <!-- 'Year' form input -->
                <label for="year">Year:</label>
                <input id="year" type="number" minlength="2" maxlength="4" required>
                <br>

                <input id="day-count" type="button" value="Calculate Days">
            </div>
        </form>

        <p id="result"></p>
        <script src="script.js"></script>
    </body>
</html>
