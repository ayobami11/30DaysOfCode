<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>100DaysOfCode Counter</title>
        <link href="https://fonts.googleapis.com/css?family=Nunito&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./style.css" type="text/css">
    </head>
    <body>
        <header>
            <h1>My #100DaysOfCode Day Counter</h1>
        </header>
        <main>
            <!-- Container section -->
            <div id="container">
                <div>
                    <h2 id="timer-header">Time Elapsed</h2>
                    <p id="normal-timer" class="timers"></p>
                    <p id="reverse-timer" class="timers"></p>
                    <!-- Toggle button -->
                    <button id="toggle-btn">Toggle Timer</button>
                </div>
            </div>
        </main>
        <script src="./script.js"></script>
    </body>
</html>
