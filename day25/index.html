<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Weather App</title>
        <link href="https://fonts.googleapis.com/css?family=Nunito&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./style.css" type="text/css">
    </head>
    <body>
        <header>
            <h1>Weather App</h1>
        </header>
        <main>
            <!-- Main section -->
            <section id="main-section">
                <div>
                    <!-- Weather section -->
                    <section id="weather">
                        <section id="input-form">
                            <input id="user-input" type="text" placeholder="Type in a city" required>
                            <button id="submit-btn" type="submit">Submit</button>
                        </section>
                        <p id="instruction"></p>
                        <!-- Output section -->
                        <section id="output">
                            <h1 id="city"></h1>
                            <p id="country"></p>
                            <p id="description"></p>
                            <p id="temperature"></p>
                            <p id="humidity"></p>
                            <p id="pressure"></p>
                        </section>
                    </section>
                </div>
            </section>
        </main>
        <script src="./script.js"></script>
    </body>
</html>
