<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock, Paper, Scissors</title>
        <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./style.css" type="text/css">
    </head>
    <body>
        <header>
            <h1>Rock, Paper, Scissors</h1>
        </header>
        <main>
            <!-- Game section -->
            <section id="game-section">
                <figure id="rock" class="options">
                    <img src="./images/rock.jpg" alt="">
                    <figcaption class="bold">Rock</figcaption>
                </figure>
                <figure id="paper" class="options">
                    <img src="./images/paper.jpg" alt="">
                    <figcaption class="bold">Paper</figcaption>
                </figure>
                <figure id="scissors" class="options">
                    <img src="./images/scissors.jpg" alt="">
                    <figcaption class="bold">Scissors</figcaption>
                </figure>
            </section>
                <!-- Bottom section -->
                <section id="bottom-section">
                    <!-- Result section -->
                <section id="result-section" class="flex-items">
                    <h2>Results</h2>
                        <div id="results">
                        <p id="computer" class="bold"></p>
                        <p id="player" class="bold"></p>
                        <p id="result" class="bold"></p>
                    </div>
                </section>
                <!-- Score section -->
                <section id="score-section" class="flex-items">
                    <h2>Scores</h2>
                    <div id="score">
                        <p id="player-score" class="bold"></p>
                        <p id="computer-score" class="bold"></p>
                    </div>
                </section>
            </section>
            <!-- Button section -->
            <div id="btn-section">
                <button id="restart-btn">Restart</button>
            </div>
        </main>
        <script src="./script.js"></script>
    </body>
</html>
