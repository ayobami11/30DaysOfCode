<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css?family=Nunito&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./style.css" type="text/css">
        <title>CSS Grid</title>
    </head>
    <body>
        <header>
            <h1 id="title">CSS Grid</h1>
        </header>
        <main>
            <h2>Image Gallery using CSS Grid</h2>
            <!-- Grid section -->
            <section id="images">
                <figure>
                    <img src="./images/avacado-and-egg-toast.jpg" alt="">
                    <figcaption>Avocado and egg toast</figcaption>
                </figure>
                <figure>
                    <img src="./images/burger.jpg" alt="">
                    <figcaption>Burger</figcaption>
                </figure>
                <figure>
                    <img src="./images/cake.jpg" alt="">
                    <figcaption>Cake</figcaption>
                </figure>
                <figure>
                    <img src="./images/cocktail.jpg" alt="">
                    <figcaption>Cocktail</figcaption>
                </figure>
                <figure>
                    <img src="./images/coffee.jpg" alt="">
                    <figcaption>Coffee</figcaption>
                </figure>
                <figure>
                    <img src="./images/french-toast.jpg" alt="">
                    <figcaption>French toast</figcaption>
                </figure>
                <figure>
                    <img src="./images/ice-cream.jpg" alt="">
                    <figcaption>Ice-cream</figcaption>
                </figure>
                <figure>
                    <img src="./images/mediterranean-salad.jpg" alt="">
                    <figcaption>Mediterranean salad</figcaption>
                </figure>
                <figure>
                    <img src="./images/quote.jpg" alt="">
                    <figcaption>Motivational Quote</figcaption>
                </figure>
                <figure>
                    <img src="./images/scallop.jpg" alt="">
                    <figcaption>Scallops</figcaption>
                </figure>
                <figure>
                    <img src="./images/aurora.jpg" alt="">
                    <figcaption>Aurora</figcaption>
                </figure>
                <figure>
                    <img src="./images/girl.jpg" alt="">
                    <figcaption>Girl</figcaption>
                </figure>
            </section>
        </main>
    </body>
</html>
