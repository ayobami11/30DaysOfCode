<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css" type="text/css">
    <title>Simple BMI Calculator</title>
</head>
<body>
    <h1>Body Mass Index (BMI) Calculator</h1>
        <form method="POST">
            <div class="form-input">
                <label for="weight">Weight (kg): </label>
                <input id="weight" type="number" name="weight" min="10" max="250" step="1" required>
            </div>
            <br>

            <div class="form-input">
                <label for="height">Height (cm):</label>
                <input id="height" type="number" name="height" min="40" max="350" step="1" required>
            </div>
            <br>

            <div class="form-input">
                <input id="submit" type="button" value="Calculate BMI">
            </div>
        </form>
        <p id="result">Please input a value.</p>
    <script src="./script.js"></script>
</body>
</html>
